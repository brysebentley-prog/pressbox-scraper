name: Weekly PressBox Scraper

on:
  schedule:
    # Runs at 10:00 AM UTC (about 3:00 AM Pacific) every Monday
    - cron: '0 10 * * 1'
  workflow_dispatch: # This adds a manual "Run Now" button for testing

permissions:
  contents: write

jobs:
  scrape-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
          
      - name: Run Scraper Script
        run: python scraper.py
        
      - name: Commit and Push new Roster
        run: |
          git config --global user.name 'PressBox Auto-Scraper'
          git config --global user.email 'scraper@pressbox.app'
          git add roster.json
          git commit -m "🤖 Auto-updated weekly roster data" || exit 0
          git push
